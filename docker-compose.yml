services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cash-mgmt-app
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - cash-mgmt
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: cash-mgmt-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cash-mgmt
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: cash-mgmt-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cash_managment}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-cash_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - cash-mgmt
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  cash-mgmt:
    driver: bridge

volumes:
  mysql-data:
