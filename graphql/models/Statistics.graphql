extend type Query {
    dashboardStatistic: DashboardStatistic @field(resolver: "StatisticQuery@dashboardStatistics")
    paymentOverview: PaymentOverview @field(resolver: "StatisticQuery@paymentOverview")
}

type DashboardStatistic {
    total_balance: Float!
    total_deposited: Float!
    total_payment: Float!
    barChartData: [BarChartData]
}

type BarChartData {
    label: String,
    backgroundColor: String,
    barChartDatasets: [BarChartDataset]
}

type BarChartDataset {
    label: String!,
    value: Float!
}

type PaymentOverview {
    total_approved_amount: Float!
    total_pending_amount: Float!
    total_voided_amount: Float!
    approved_count: Int!
    pending_count: Int!
    voided_count: Int!
}